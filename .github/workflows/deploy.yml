name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SSH_SETUP: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
    nvm use 22
    cd ~/forsa-crm-zhalusi

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            su - forsa << 'STEP'
            cd forsa-crm-zhalusi
            if [ -f .env ]; then cp .env /tmp/.env.backup; fi
            git fetch origin
            git reset --hard origin/main
            if [ -f /tmp/.env.backup ]; then cp /tmp/.env.backup .env; fi
            echo "Latest commit:"
            git log --oneline -1
            STEP

      - name: Install dependencies
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            su - forsa << 'STEP'
            export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm use 22
            cd forsa-crm-zhalusi
            npm install --prefer-offline
            STEP

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            su - forsa << 'STEP'
            export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm use 22
            cd forsa-crm-zhalusi
            npm run db:migrate
            STEP

      - name: Build application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            su - forsa << 'STEP'
            export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm use 22
            cd forsa-crm-zhalusi
            npm run build
            STEP

      - name: Restart application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            su - forsa << 'STEP'
            export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm use 22
            cd forsa-crm-zhalusi
            npx kill-port 5000 || true
            nohup npm run start > nohup.out 2>&1 &
            STEP
            systemctl restart nginx

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/auth/me 2>/dev/null)
            echo "Server response: HTTP $STATUS"
            if echo "$STATUS" | grep -qE "200|401|302"; then
              echo "Server is running"
            else
              echo "Server failed to start! Last logs:"
              su - forsa -c "tail -30 ~/forsa-crm-zhalusi/nohup.out"
              exit 1
            fi
